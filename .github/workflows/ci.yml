name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Linux dependencies (Tauri, SQLCipher, CPAL)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            pkg-config \
            libssl-dev \
            libasound2-dev

      - uses: dtolnay/rust-toolchain@stable

      - name: Rust tests
        run: cargo test
        working-directory: brief/src-tauri

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Python tests
        run: |
          python3 -m pip install -r requirements-dev.txt
          python3 -m pytest
        working-directory: brief/whisperx_runner

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: brief/package-lock.json

      - name: Install npm dependencies
        run: npm ci
        working-directory: brief

      - name: Vitest
        run: npm run test
        working-directory: brief

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: MkDocs (strict)
        run: |
          python3 -m pip install -r requirements-docs.txt
          python3 -m mkdocs build --strict
